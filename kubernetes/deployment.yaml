apiVersion: apps/v1
kind: Deployment
metadata:
  name: walloop-engine
  labels:
    app: walloop-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: walloop-engine
  template:
    metadata:
      labels:
        app: walloop-engine
    spec:
      containers:
        - name: walloop-engine
          image: walloop-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: walloop
            - name: DB_SCHEMA
              value: engine
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: walloop-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: walloop-db
                  key: password
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              value: guest
            - name: RABBITMQ_PASSWORD
              value: guest
            - name: EUREKA_CLIENT_SERVICE_URL
              value: http://eureka:8761/eureka/
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://walloop-otel-collector:4317
            - name: LIQUID_RPC_HOST
              value: walloop-liquid-node
            - name: LIQUID_RPC_PORT
              value: "7041"
            - name: LIQUID_RPC_USERNAME
              value: rpcuser
            - name: LIQUID_RPC_PASSWORD
              value: rpcpassword
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: walloop-engine
spec:
  selector:
    app: walloop-engine
  ports:
    - name: http
      port: 80
      targetPort: 8080
