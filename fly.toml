app = "walloop-engine"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_SCHEMA = "engine"
  MANAGEMENT_TRACING_ENABLED = "false"
  OTEL_TRACES_EXPORTER = "none"
  EUREKA_CLIENT_ENABLED = "true"
  EUREKA_CLIENT_SERVICE_URL = "http://walloop-edge.internal:8761/eureka"
  WALLOOP_WALLET_BASE_URL = "http://walloop-wallet.internal:8080"
  SPRING_RABBITMQ_SSL_ENABLED = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    type = "http"
    interval = "15s"
    timeout = "2s"
    grace_period = "120s"
    method = "GET"
    path = "/actuator/health"

[deploy]
  wait_timeout = "5m"

[vm]
  size = "shared-cpu-1x"
  memory = "512mb"
