spring:
  datasource:
    url: jdbc:h2:mem:walloop_engine_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: PUBLIC
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

eureka:
  client:
    enabled: false
