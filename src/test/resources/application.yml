spring:
  datasource:
    url: jdbc:h2:mem:walloop_engine_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: PUBLIC
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

liquid:
  rpc:
    url: http://localhost:7041
    username: rpcuser
    password: rpcpassword

sideshift:
  base-url: https://sideshift.ai/api/v2
  settle-coin: usdt
  settle-network: liquid

boltz:
  base-url: http://localhost:8089

fixedfloat:
  base-url: http://localhost:8090

eureka:
  client:
    enabled: false

org:
  tbk:
    lightning:
      lnd:
        grpc:
          enabled: false
