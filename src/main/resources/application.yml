spring:
  application:
    name: walloop-engine
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/walloop}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: 0
      idle-timeout: 30000
      maximum-pool-size: 5
      max-lifetime: 1200000
      connection-timeout: 30000
      data-source-properties:
        sslmode: require
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: engine
    schemas: engine
    create-schemas: true
    ignore-unsupported-database: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000
        default-requeue-rejected: false
liquid:
  rpc:
    url: ${LIQUID_RPC_URL}
    username: ${LIQUID_RPC_USERNAME}
    password: ${LIQUID_RPC_PASSWORD}
sideshift:
  base-url: ${SIDESHIFT_BASE_URL}
  secret: ${SIDESHIFT_SECRET}
  affiliate-id: ${SIDESHIFT_AFFILIATE_ID}
  status-cron: 0 * * * * *
fixedfloat:
  base-url: ${FIXEDFLOAT_BASE_URL}
  api-key: ${FIXEDFLOAT_API_KEY}
  api-secret: ${FIXEDFLOAT_API_SECRET}
  refcode: ${FIXEDFLOAT_REFCODE}
  afftax: 0
  status-cron: 0 * * * * *
boltz:
  base-url: ${BOLTZ_BASE_URL}
  claim:
    enabled: true
    pending-status: transaction.claim.pending
    signer-url: ${BOLTZ_CLAIM_SIGNER_URL}
  status-cron: 0 * * * * *
  paid-status: transaction.claimed
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 2000
  main:
    allow-bean-definition-overriding: true
    banner-mode: console

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: ERROR
    io.micrometer.registry.otlp: OFF

management:
  health:
    db:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

org:
  tbk:
    lightning:
      lnd:
        grpc:
          enabled: true
          host: ${LND_GRPC_HOST}
          port: ${LND_GRPC_PORT}
          macaroon-base64: ${LND_GRPC_MACAROON_BASE64}
          cert-base64: ${LND_GRPC_CERT_BASE64}
          macaroon-file-path: ${LND_GRPC_MACAROON_FILE:}
          cert-file-path: ${LND_GRPC_CERT_FILE:}
          

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    ip-address: ${FLY_PRIVATE_IP:127.0.0.1}
    instance-id: ${FLY_APP_NAME:walloop-engine}:${FLY_PRIVATE_IP:127.0.0.1}

walloop:
  pair-availability:
    cache-seconds: 60
  wallet:
    base-url: ${WALLOOP_WALLET_BASE_URL}
  lightning:
    invoice-expiry-seconds: 7200
    inbound-check-enabled: true
    inbound-retry-delay: PT1M
    lsp:
      provider: amboss-magma
      node-pubkey: 030f0b8e9b8b047df76db393dcd9278994020dda10cc909ac294aa4aca778f25b3
      base-url: ${WALLOOP_LIGHTNING_LSP_BASE_URL}
      api-key: ${WALLOOP_LIGHTNING_LSP_API_KEY}
  fee:
    platform-percent: 0.5
    sideshift-percent: 0.5
    boltz-percent: 0.1
    fixedfloat-percent: 0.5
    onchain-chains: BTC,L-BTC,LBTC,LIQUID
    rate-provider:
      type: coincap
    coincap:
      base-url: ${COINCAP_BASE_URL}
      api-key: ${WALLOOP_FEE_COINCAP_API_KEY}
      usd-brl-rate-id: brazilian-real
      cache-seconds: 300
  explorer:
    tx-base-urls:
      ethereum: https://etherscan.io
      bsc: https://bscscan.com
      polygon: https://polygonscan.com
      arbitrum: https://arbiscan.io
      avalanche: https://snowtrace.io
      base: https://basescan.org
      optimism: https://optimistic.etherscan.io
      bitcoin: https://mempool.space
      liquid: https://liquid.network

