spring:
  application:
    name: walloop-engine
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:walloop}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:walloop}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:walloop}}
    hikari:
      minimum-idle: 0
      idle-timeout: 30000
      maximum-pool-size: 5
      max-lifetime: 1200000
      connection-timeout: 30000
      data-source-properties:
        sslmode: require
        sslrootcert: /app/certs/neon-root-ca.pem
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${DB_SCHEMA:engine}
    schemas: ${DB_SCHEMA:engine}
    create-schemas: true
    ignore-unsupported-database: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
    port: ${SPRING_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
    username: ${RABBITMQ_USER:${RABBITMQ_USERNAME:guest}}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:${RABBITMQ_VHOST:/}}
liquid:
  rpc:
    url: ${LIQUID_RPC_URL:walloop-liquid-node.internal:7041}
    username: ${LIQUID_RPC_USERNAME:walloop-liquid}
    password: ${LIQUID_RPC_PASSWORD:walloop-liquid}
sideshift:
  base-url: ${SIDESHIFT_BASE_URL:https://sideshift.ai/api/v2}
  secret: ${SIDESHIFT_SECRET:***REMOVED***}
  affiliate-id: ${SIDESHIFT_AFFILIATE_ID:***REMOVED***}
  status-cron: 0 * * * * *
fixedfloat:
  base-url: ${FIXEDFLOAT_BASE_URL:https://ff.io/api/v2}
  api-key: ${FIXEDFLOAT_API_KEY:***REMOVED***}
  api-secret: ${FIXEDFLOAT_API_SECRET:***REMOVED***}
  refcode: ${FIXEDFLOAT_REFCODE:***REMOVED***}
  afftax: ${FIXEDFLOAT_AFFTAX:}
  status-cron: 0 * * * * *
boltz:
  base-url: ${BOLTZ_BASE_URL:https://api.boltz.exchange/v2}
  status-cron: 0 * * * * *
  paid-status: invoice.paid
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 2000
  main:
    allow-bean-definition-overriding: true
    banner-mode: console

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: ERROR
    io.micrometer.registry.otlp: OFF

management:
  health:
    db:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

org:
  tbk:
    lightning:
      lnd:
        grpc:
          enabled: true
          host: ${LND_GRPC_HOST:[fdaa:3a:c627:a7b:5d3:96a9:d10e:2]}
          port: ${LND_GRPC_PORT:10009}
          macaroon-base64: ${LND_GRPC_MACAROON_BASE64:}
          cert-base64: ${LND_GRPC_CERT_BASE64:}
          macaroon-file-path: ${LND_GRPC_MACAROON_FILE:}
          cert-file-path: ${LND_GRPC_CERT_FILE:}
          

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    ip-address: ${FLY_PRIVATE_IP:127.0.0.1}
    instance-id: ${FLY_APP_NAME:walloop-engine}:${FLY_PRIVATE_IP:127.0.0.1}

walloop:
  wallet:
    base-url: ${WALLOOP_WALLET_BASE_URL:http://localhost:8080}
