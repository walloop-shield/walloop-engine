spring:
  application:
    name: walloop-engine
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:walloop}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:walloop}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:walloop}}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:engine}
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${DB_SCHEMA:engine}
    schemas: ${DB_SCHEMA:engine}
    create-schemas: true
    ignore-unsupported-database: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
    port: ${SPRING_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
    username: ${RABBITMQ_USER:${RABBITMQ_USERNAME:guest}}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:${RABBITMQ_VHOST:/}}
liquid:
  rpc:
    url: ${LIQUID_RPC_URL:http://localhost:7041}
    username: ${LIQUID_RPC_USERNAME:rpcuser}
    password: ${LIQUID_RPC_PASSWORD:rpcpassword}
sideshift:
  base-url: ${SIDESHIFT_BASE_URL:https://sideshift.ai/api/v2}
  secret: ${SIDESHIFT_SECRET:}
  affiliate-id: ${SIDESHIFT_AFFILIATE_ID:}
  simulation-from-coin: ${SIDESHIFT_SIMULATION_FROM_COIN:usdt}
  simulation-from-network: ${SIDESHIFT_SIMULATION_FROM_NETWORK:liquid}
  simulation-to-coin: ${SIDESHIFT_SIMULATION_TO_COIN:btc}
  simulation-to-network: ${SIDESHIFT_SIMULATION_TO_NETWORK:liquid}
  status-cron: ${SIDESHIFT_STATUS_CRON:0 * * * * *}
  settle-coin: ${SIDESHIFT_SETTLE_COIN:btc}
  settle-network: ${SIDESHIFT_SETTLE_NETWORK:liquid}
fixedfloat:
  base-url: ${FIXEDFLOAT_BASE_URL:https://ff.io/api/v2}
  api-key: ${FIXEDFLOAT_API_KEY:}
  api-secret: ${FIXEDFLOAT_API_SECRET:}
  order-type: ${FIXEDFLOAT_ORDER_TYPE:float}
  direction: ${FIXEDFLOAT_DIRECTION:from}
  from-ccy: ${FIXEDFLOAT_FROM_CCY:BTCLN}
  required-confirmations: ${FIXEDFLOAT_REQUIRED_CONFIRMATIONS:1}
  refcode: ${FIXEDFLOAT_REFCODE:}
  afftax: ${FIXEDFLOAT_AFFTAX:}
  status-cron: ${FIXEDFLOAT_STATUS_CRON:0 * * * * *}
boltz:
  base-url: ${BOLTZ_BASE_URL:https://api.boltz.exchange/v2}
  status-cron: ${BOLTZ_STATUS_CRON:0 * * * * *}
  paid-status: ${BOLTZ_PAID_STATUS:invoice.paid}
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 2000
  main:
    allow-bean-definition-overriding: true
    banner-mode: console

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.walloop.engine: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

clients:
  notification:
    url: ${NOTIFICATION_URL:http://localhost:8081}
  lightning:
    url: ${LIGHTNING_URL:http://localhost:8083}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    ip-address: ${FLY_PRIVATE_IP:127.0.0.1}
    instance-id: ${FLY_APP_NAME:walloop-engine}:${FLY_PRIVATE_IP:127.0.0.1}
