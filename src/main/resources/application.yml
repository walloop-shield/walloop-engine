spring:
  application:
    name: walloop-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:walloop}
    username: ${DB_USERNAME:walloop}
    password: ${DB_PASSWORD:walloop}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:engine}
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${DB_SCHEMA:engine}
    schemas: ${DB_SCHEMA:engine}
    create-schemas: true
    ignore-unsupported-database: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
liquid:
  rpc:
    host: ${LIQUID_RPC_HOST:localhost}
    port: ${LIQUID_RPC_PORT:7041}
    username: ${LIQUID_RPC_USERNAME:rpcuser}
    password: ${LIQUID_RPC_PASSWORD:rpcpassword}
sideshift:
  base-url: ${SIDESHIFT_BASE_URL:https://sideshift.ai/api/v2}
  settle-coin: ${SIDESHIFT_SETTLE_COIN:usdt}
  settle-network: ${SIDESHIFT_SETTLE_NETWORK:liquid}
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 2000
  main:
    allow-bean-definition-overriding: true
    banner-mode: console

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.walloop.engine: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

clients:
  notification:
    url: ${NOTIFICATION_URL:http://localhost:8081}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
